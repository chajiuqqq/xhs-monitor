<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="100%" role="img">
  <title>小红书监控工程 - 部署架构</title>
  <desc>远程主机部署：systemd 管理 bot 和 pipeline 定时任务</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font: 14px var(--font-sans, system-ui); fill: var(--color-text-primary, #1a1a1a); }
    .ts { font: 12px var(--font-sans, system-ui); fill: var(--color-text-secondary, #666); }
    .th { font: 500 14px var(--font-sans, system-ui); fill: var(--color-text-primary, #1a1a1a); }
    .box { fill: var(--color-background-secondary, #f5f5f5); stroke: var(--color-border-tertiary, rgba(0,0,0,0.15)); stroke-width: 0.5; }
    .arr { stroke: var(--color-text-tertiary, #999); stroke-width: 1.5; fill: none; }
  </style>

  <text class="t" x="40" y="32" font-weight="500">部署架构 · dev@192.168.39.240</text>
  <text class="ts" x="40" y="50">systemd --user (linger=enabled) · 飞书 Bot + 定时 Pipeline</text>

  <g>
    <rect class="box" x="40" y="80" width="600" height="240" rx="14" fill="var(--color-background-tertiary, #fafaf8)"/>
    <text class="th" x="60" y="106">远程主机 dev@192.168.39.240 (Ubuntu 24.04)</text>
  </g>

  <g>
    <rect class="box" x="60" y="125" width="270" height="180" rx="10"/>
    <text class="th" x="195" y="148" text-anchor="middle">xhs-monitor-bot.service</text>
    <text class="ts" x="195" y="167" text-anchor="middle">持续运行 · Restart=always</text>
    <line class="arr" x1="80" y1="180" x2="310" y2="180"/>
    <text class="ts" x="80" y="195">├─ Python bot.py</text>
    <text class="ts" x="80" y="213">│   ├─ 解析 /list /add /delete</text>
    <text class="ts" x="80" y="231">│   └─ 调用 manage.py run</text>
    <text class="ts" x="80" y="255">└─ lark-cli event consume</text>
    <text class="ts" x="80" y="273">    └─ bot 身份 P2P 监听</text>
    <text class="ts" x="80" y="293">输出: 飞书私聊回复</text>
  </g>

  <g>
    <rect class="box" x="350" y="125" width="270" height="180" rx="10"/>
    <text class="th" x="485" y="148" text-anchor="middle">xhs-monitor-pipeline.timer</text>
    <text class="ts" x="485" y="167" text-anchor="middle">每 6h 触发 · OnBootSec=2min</text>
    <line class="arr" x1="370" y1="180" x2="600" y2="180"/>
    <text class="ts" x="370" y="195">└─ pipeline.service (oneshot)</text>
    <text class="ts" x="370" y="213">    └─ python3 manage.py run</text>
    <text class="ts" x="370" y="237">        ├─ pipeline.py</text>
    <text class="ts" x="370" y="255">        │   └─ Playwright + /snap/chromium</text>
    <text class="ts" x="370" y="273">        └─ push_feishu.py</text>
    <text class="ts" x="370" y="293">            └─ lark-cli im +messages-send</text>
  </g>

  <g>
    <rect class="box" x="40" y="340" width="600" height="100" rx="10"/>
    <text class="th" x="60" y="362">持久化数据</text>
    <line class="arr" x1="60" y1="375" x2="620" y2="375"/>
    <text class="ts" x="60" y="395">~/xhs_monitor/tasks.json        监控关键词配置</text>
    <text class="ts" x="60" y="413">~/xhs_monitor/db/monitor.db     SQLite 去重 (noteId + content_hash)</text>
    <text class="ts" x="60" y="431">~/xhs_monitor/cookies/          小红书登录态</text>
  </g>

  <text class="ts" x="40" y="455" fill="var(--color-text-tertiary, #999)">重启主机后 systemd --user 自动恢复，需先执行 loginctl enable-linger dev</text>
</svg>
