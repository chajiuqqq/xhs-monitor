<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="100%" role="img">
  <title>小红书监控工程 - 关键节点流程</title>
  <desc>五节点流水线：任务拆解 → 搜索 → 去重 → 解析 → 推送，每节点标注状态</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font: 14px var(--font-sans, system-ui); fill: var(--color-text-primary, #1a1a1a); }
    .ts { font: 12px var(--font-sans, system-ui); fill: var(--color-text-secondary, #666); }
    .th { font: 500 14px var(--font-sans, system-ui); fill: var(--color-text-primary, #1a1a1a); }
    .box { fill: var(--color-background-secondary, #f5f5f5); stroke: var(--color-border-tertiary, rgba(0,0,0,0.15)); stroke-width: 0.5; }
    .arr { stroke: var(--color-text-tertiary, #999); stroke-width: 1.5; fill: none; }
    .lbl-done { fill: var(--color-text-success, #3B6D11); }
    .lbl-build { fill: var(--color-text-warning, #854F0B); }
  </style>

  <text class="t" x="40" y="32" font-weight="500">小红书监控工程 · 关键节点流程</text>
  <text class="ts" x="40" y="50">用户需求 → LLM拆解 → Playwright搜索 → SSR解析 → 飞书推送</text>

  <g class="node">
    <rect class="box" x="40" y="80" width="170" height="64" rx="10"/>
    <text class="th" x="125" y="104" text-anchor="middle">① 任务拆解</text>
    <text class="ts" x="125" y="124" text-anchor="middle">自然语言 → 关键词</text>
    <text class="ts lbl-done" x="125" y="140" text-anchor="middle">✓ LLM 已具备</text>
  </g>

  <g class="node">
    <rect class="box" x="255" y="80" width="170" height="64" rx="10"/>
    <text class="th" x="340" y="104" text-anchor="middle">② 小红书搜索</text>
    <text class="ts" x="340" y="124" text-anchor="middle">Playwright + Chrome</text>
    <text class="ts lbl-done" x="340" y="140" text-anchor="middle">✓ 核心开发完成</text>
  </g>

  <g class="node">
    <rect class="box" x="470" y="80" width="170" height="64" rx="10"/>
    <text class="th" x="555" y="104" text-anchor="middle">③ 增量去重</text>
    <text class="ts" x="555" y="124" text-anchor="middle">SQLite 双层去重</text>
    <text class="ts lbl-done" x="555" y="140" text-anchor="middle">✓ noteId + hash</text>
  </g>

  <g class="node">
    <rect class="box" x="40" y="200" width="170" height="64" rx="10"/>
    <text class="th" x="125" y="224" text-anchor="middle">④ 内容解析</text>
    <text class="ts" x="125" y="244" text-anchor="middle">SSR 节点提取</text>
    <text class="ts lbl-done" x="125" y="260" text-anchor="middle">✓ __INITIAL_STATE__</text>
  </g>

  <g class="node">
    <rect class="box" x="255" y="200" width="170" height="64" rx="10"/>
    <text class="th" x="340" y="224" text-anchor="middle">⑤ 飞书推送</text>
    <text class="ts" x="340" y="244" text-anchor="middle">Markdown 简报</text>
    <text class="ts lbl-done" x="340" y="260" text-anchor="middle">✓ lark-cli bot</text>
  </g>

  <g class="node">
    <rect class="box" x="470" y="200" width="170" height="64" rx="10"/>
    <text class="th" x="555" y="224" text-anchor="middle">⑥ 飞书 Bot</text>
    <text class="ts" x="555" y="244" text-anchor="middle">/list /add /run</text>
    <text class="ts lbl-done" x="555" y="260" text-anchor="middle">✓ systemd 后台</text>
  </g>

  <g class="node">
    <rect class="box" x="40" y="320" width="170" height="64" rx="10"/>
    <text class="th" x="125" y="344" text-anchor="middle">⑦ 定时调度</text>
    <text class="ts" x="125" y="364" text-anchor="middle">每 6h 触发</text>
    <text class="ts lbl-done" x="125" y="380" text-anchor="middle">✓ systemd timer</text>
  </g>

  <g class="node">
    <rect class="box" x="255" y="320" width="170" height="64" rx="10"/>
    <text class="th" x="340" y="344" text-anchor="middle">⑧ 远程部署</text>
    <text class="ts" x="340" y="364" text-anchor="middle">dev@192.168.39.240</text>
    <text class="ts lbl-done" x="340" y="380" text-anchor="middle">✓ linger + 服务</text>
  </g>

  <g class="node">
    <rect class="box" x="470" y="320" width="170" height="64" rx="10"/>
    <text class="th" x="555" y="344" text-anchor="middle">⑨ 运维手册</text>
    <text class="ts" x="555" y="364" text-anchor="middle">OPS.md</text>
    <text class="ts lbl-done" x="555" y="380" text-anchor="middle">✓ 部署/排错/备份</text>
  </g>

  <line class="arr" x1="210" y1="112" x2="255" y2="112" marker-end="url(#arrow)"/>
  <line class="arr" x1="425" y1="112" x2="470" y2="112" marker-end="url(#arrow)"/>
  <path class="arr" d="M555 144 L555 168 Q555 180 470 180 L210 180 Q125 180 125 200" marker-end="url(#arrow)"/>
  <line class="arr" x1="210" y1="232" x2="255" y2="232" marker-end="url(#arrow)"/>
  <line class="arr" x1="425" y1="232" x2="470" y2="232" marker-end="url(#arrow)"/>
  <path class="arr" d="M340 264 L340 320" marker-end="url(#arrow)"/>
  <line class="arr" x1="210" y1="352" x2="255" y2="352" marker-end="url(#arrow)"/>
  <line class="arr" x1="425" y1="352" x2="470" y2="352" marker-end="url(#arrow)"/>

  <text class="ts" x="40" y="450" font-weight="500">核心成果</text>
  <text class="ts" x="40" y="470">• 9 个节点全部完成，核心链路 100% 跑通</text>
  <text class="ts" x="40" y="487">• 远程主机 systemd 自启，飞书 Bot 命令可管理</text>
  <text class="ts" x="40" y="504">• 18 篇新增帖子成功解析并推送到飞书私聊</text>
  <text class="ts" x="40" y="521">• 完整运维手册 + 架构文档已就绪</text>
</svg>
